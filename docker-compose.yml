services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devis_mariages
      POSTGRES_USER: devis
      POSTGRES_PASSWORD: devis_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
