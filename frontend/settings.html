<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Paramètres — Devis Mariages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css?v=3">
  <script src="/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body); background: var(--cream); color: var(--ink);
      -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;
    }

    /* ── Top nav (mirrors legal / pricing pages) ── */
    .legal-nav {
      background: #111; padding: 14px 6%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .legal-nav-logo {
      font-family: var(--font-display); font-size: 18px; color: #fff;
      text-decoration: none; font-weight: 500;
    }
    .legal-nav-right { display: flex; align-items: center; gap: 18px; }
    .legal-nav-back {
      font-size: 13px; color: rgba(255,255,255,.55); text-decoration: none;
      display: flex; align-items: center; gap: 6px; transition: color .15s;
    }
    .legal-nav-back:hover { color: #fff; }
    .nav-lang { display: flex; gap: 2px; background: rgba(255,255,255,.1); border-radius: 6px; padding: 3px; }
    .nav-lang span {
      font-size: 11px; font-weight: 600; letter-spacing: .03em; color: rgba(255,255,255,.5);
      padding: 3px 9px; border-radius: 4px; cursor: pointer; transition: background .15s, color .15s;
    }
    .nav-lang span.active { background: #fff; color: #111; }

    /* ── Content ── */
    main { flex: 1; width: 100%; max-width: 620px; margin: 0 auto; padding: 56px 24px 80px; }
    .st-eyebrow {
      font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
      color: var(--gold); font-weight: 600; margin-bottom: 12px;
    }
    h1 {
      font-family: var(--font-display); font-size: clamp(28px, 5vw, 40px);
      color: var(--green-dark); font-weight: 500; line-height: 1.2; margin-bottom: 36px;
    }

    .st-card {
      background: #fff; border: 1px solid var(--border); border-radius: 16px;
      padding: 8px 26px; margin-bottom: 28px;
    }
    .st-row {
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      padding: 20px 0; border-top: 1px solid #f1eee8;
    }
    .st-row:first-child { border-top: none; }
    .st-label { font-size: 14px; color: #888; font-weight: 500; flex-shrink: 0; }
    .st-value {
      font-size: 15px; color: var(--ink); font-weight: 600; text-align: right;
      word-break: break-word; min-width: 0;
    }
    .st-value-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .st-plan-badge {
      font-size: 12px; font-weight: 700; color: var(--green); background: #eef4f0;
      border-radius: 6px; padding: 3px 10px;
    }
    .st-manage {
      font-size: 13px; font-weight: 600; color: var(--green); text-decoration: none;
      border: 1px solid var(--green); border-radius: 8px; padding: 6px 14px; transition: background .15s;
      white-space: nowrap;
    }
    .st-manage:hover { background: #f3f7f4; }
    .st-lang { display: flex; gap: 4px; }
    .st-lang span {
      font-size: 12px; font-weight: 700; color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 13px; cursor: pointer; transition: all .15s;
    }
    .st-lang span.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* ── Actions ── */
    .st-actions { display: flex; flex-direction: column; gap: 12px; }
    .st-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 18px; border-radius: 10px; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; text-decoration: none; border: 1px solid var(--border);
      background: #fff; color: var(--ink); transition: background .15s, border-color .15s;
    }
    .st-btn:hover { background: #faf9f6; }
    .st-btn.danger { color: #b3261e; border-color: #f0d4d1; }
    .st-btn.danger:hover { background: #fdf3f2; }

    .st-loading { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

    @media (max-width: 600px) {
      main { padding: 36px 20px 60px; }
      .st-row { flex-direction: column; align-items: flex-start; gap: 6px; }
      .st-value, .st-value-group { text-align: left; justify-content: flex-start; }
    }
  </style>
</head>
<body>

<nav class="legal-nav">
  <a href="/" class="legal-nav-logo">Devis Mariages</a>
  <div class="legal-nav-right">
    <div class="nav-lang">
      <span id="nav-lang-fr" onclick="setLang('fr')">FR</span>
      <span id="nav-lang-en" onclick="setLang('en')">EN</span>
    </div>
    <a href="/dashboard" class="legal-nav-back" data-i18n="nav_back">← Tableau de bord</a>
  </div>
</nav>

<main>
  <p class="st-eyebrow" data-i18n="eyebrow">Compte</p>
  <h1 data-i18n="title">Paramètres du compte</h1>

  <div id="st-content" class="st-loading" data-i18n="loading">Chargement…</div>

  <template id="st-template">
    <div class="st-card">
      <div class="st-row">
        <span class="st-label" data-i18n="label_name">Nom</span>
        <span class="st-value" id="v-name"></span>
      </div>
      <div class="st-row">
        <span class="st-label" data-i18n="label_email">Email</span>
        <span class="st-value" id="v-email"></span>
      </div>
      <div class="st-row">
        <span class="st-label" data-i18n="label_plan">Forfait</span>
        <span class="st-value-group">
          <span class="st-plan-badge" id="v-plan"></span>
          <a class="st-manage" href="/pricing" data-i18n="manage">Gérer</a>
        </span>
      </div>
      <div class="st-row">
        <span class="st-label" data-i18n="label_lang">Langue</span>
        <span class="st-lang">
          <span id="set-lang-fr" onclick="setLang('fr')">FR</span>
          <span id="set-lang-en" onclick="setLang('en')">EN</span>
        </span>
      </div>
    </div>

    <div class="st-actions">
      <a class="st-btn" href="/dashboard" data-i18n="back_dashboard">← Retour au tableau de bord</a>
      <button class="st-btn" onclick="doLogout()" data-i18n="logout">Déconnexion</button>
      <button class="st-btn danger" onclick="doReset()" data-i18n="reset">Réinitialiser le profil</button>
    </div>
  </template>
</main>

<script>
  const T = {
    fr: {
      page_title: "Paramètres — Devis Mariages",
      nav_back: "← Tableau de bord",
      eyebrow: "Compte",
      title: "Paramètres du compte",
      loading: "Chargement…",
      label_name: "Nom", label_email: "Email", label_plan: "Forfait", label_lang: "Langue",
      manage: "Gérer",
      back_dashboard: "← Retour au tableau de bord",
      logout: "Déconnexion",
      reset: "Réinitialiser le profil",
      reset_confirm: "Réinitialiser votre profil effacera vos données locales. Continuer ?",
      plan_free: "Découverte", plan_plus: "Plus", plan_conciergerie: "Conciergerie",
    },
    en: {
      page_title: "Settings — Devis Mariages",
      nav_back: "← Dashboard",
      eyebrow: "Account",
      title: "Account settings",
      loading: "Loading…",
      label_name: "Name", label_email: "Email", label_plan: "Plan", label_lang: "Language",
      manage: "Manage",
      back_dashboard: "← Back to dashboard",
      logout: "Log out",
      reset: "Reset profile",
      reset_confirm: "Resetting your profile will erase your local data. Continue?",
      plan_free: "Discovery", plan_plus: "Plus", plan_conciergerie: "Concierge",
    }
  };

  let currentLang = 'fr';

  function planName(plan) {
    return T[currentLang][`plan_${plan}`] || T[currentLang].plan_free;
  }

  function setLang(lang) {
    if (!T[lang]) return;
    currentLang = lang;
    document.documentElement.lang = lang;
    document.title = T[lang].page_title;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (T[lang][key] !== undefined) el.textContent = T[lang][key];
    });
    ['nav-lang', 'set-lang'].forEach(p => {
      const fr = document.getElementById(`${p}-fr`), en = document.getElementById(`${p}-en`);
      if (fr) fr.classList.toggle('active', lang === 'fr');
      if (en) en.classList.toggle('active', lang === 'en');
    });
    // Re-render the plan badge (its text is dynamic, not a static data-i18n key)
    const planEl = document.getElementById('v-plan');
    if (planEl && planEl.dataset.plan) planEl.textContent = planName(planEl.dataset.plan);
    localStorage.setItem('preferred_language', lang);
  }

  async function doLogout() {
    try { await authFetch('/api/auth/logout', { method: 'POST', on401: 'ignore' }); } catch (e) {}
    clearAuthCache();
    window.location.href = '/';
  }

  async function doReset() {
    if (!confirm(T[currentLang].reset_confirm)) return;
    try { await authFetch('/api/auth/logout', { method: 'POST', on401: 'ignore' }); } catch (e) {}
    localStorage.clear();
    window.location.href = '/';
  }

  async function loadSettings() {
    if (!getToken()) { window.location.href = '/onboarding.html?mode=login'; return; }
    let data;
    try {
      const res = await authFetch('/api/user/profile');   // 401 → authFetch redirects
      if (!res.ok) throw new Error(res.status);
      data = await res.json();
    } catch (err) {
      if (err.message === 'session_expired') return;
      window.location.href = '/dashboard';
      return;
    }
    // Swap the loading placeholder for the populated template. Drop the
    // data-i18n="loading" marker first, otherwise the setLang() call below would
    // reset this container's textContent back to "Loading…", wiping the card.
    const content = document.getElementById('st-content');
    content.removeAttribute('data-i18n');
    content.className = '';
    content.innerHTML = '';
    content.appendChild(document.getElementById('st-template').content.cloneNode(true));

    document.getElementById('v-name').textContent = data.name || '';
    document.getElementById('v-email').textContent = data.email || '';
    const plan = data.plan || 'free';
    const planEl = document.getElementById('v-plan');
    planEl.dataset.plan = plan;
    planEl.textContent = planName(plan);

    // Apply translations to the freshly-inserted template nodes.
    setLang(currentLang);
  }

  // Boot: pick the language already chosen elsewhere on the site, then load.
  const saved = localStorage.getItem('preferred_language') || localStorage.getItem('lp_lang');
  const browser = (navigator.language || 'fr').substring(0, 2);
  currentLang = (saved && T[saved]) ? saved : (T[browser] ? browser : 'fr');
  setLang(currentLang);
  loadSettings();
</script>
</body>
</html>
